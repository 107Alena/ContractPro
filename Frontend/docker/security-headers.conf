# ContractPro Frontend — security headers snippet (§13.2 high-architecture).
#
# Подключается через `include /etc/nginx/snippets/security-headers.conf;` в
# каждом location, где есть свой `add_header` (например, Cache-Control).
#
# Причина: nginx наследует `add_header` от server-уровня ТОЛЬКО если в текущем
# location нет ни одной собственной директивы add_header. Иначе server-level
# headers тихо пропадают. Snippet решает это явным повторением.
#
# CSP здесь не задаётся — это ответственность edge reverse-proxy (§12.2),
# чтобы сохранить возможность инжекта nonce per-request.

add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
add_header X-Frame-Options "DENY" always;
