# ContractPro Frontend — production nginx config (§13.2 high-architecture).
#
# Deployment topology: same-origin (ADR-6 в ApiBackendOrchestrator). Один и тот
# же origin раздаёт SPA-статику и проксирует /api/v1/* на Orchestrator. Браузер
# не видит кросс-origin — CORS не активируется, OpenTelemetry traceparent
# (§14.3) не требует preflight allow-list.
#
# Upstream — hostname `orchestrator` резолвится через Docker-Compose network
# (docker-compose.*.yaml в корне репозитория).
#
# NB про security-headers: nginx `add_header` НЕ наследуется в location, если
# там задана СВОЯ директива add_header (вместо merge — замена). Поэтому
# security-headers.conf подключается в КАЖДОМ location явно. Не удалять
# include-и даже если location не задаёт собственные заголовки — упрощает
# ревью и гарантирует инварианты при будущих правках.

server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Gzip для текстовых ресурсов; application/wasm и бинарники не сжимаем
  # (Vite кодирует изображения/шрифты отдельно).
  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
  gzip_min_length 512;

  # ------------------------------------------------------------------ ассеты
  # Immutable hashed-assets от Vite (assets/*.[hash].{js,css,...}).
  # Безопасно кэшировать на год — новый build меняет hash.
  location /assets/ {
    include /etc/nginx/snippets/security-headers.conf;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  # Runtime-config (§13.5): entrypoint.sh перезаписывает /config.js на старте
  # контейнера из ENV. no-store критичен — один и тот же образ ходит в
  # stage/prod с разными значениями.
  location = /config.js {
    include /etc/nginx/snippets/security-headers.conf;
    add_header Cache-Control "no-store" always;
    try_files $uri =404;
  }

  # index.html — никогда не кэшируем, иначе клиент застрянет на старых
  # assets-хэшах.
  location = /index.html {
    include /etc/nginx/snippets/security-headers.conf;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  # --------------------------------------------------------------------- SSE
  # Long-lived `text/event-stream` канал (§7.7). Буферизация обязана быть
  # выключена, иначе клиент не видит real-time события.
  #
  # Важно:
  #   - longest-prefix-match → этот location выигрывает у /api/ (backend-
  #     reliability-engineer подтвердил, нужен только ^~ при конфликте с
  #     regex-locations, которых здесь нет);
  #   - `gzip off` — защита от будущего расширения gzip_types, которое
  #     включит text/event-stream и тихо сломает стрим;
  #   - `Connection ''` очищает `Connection: close` от HTTP/1.0-клиентов
  #     (hop-by-hop header), позволяет keep-alive upstream;
  #   - Go net/http автоматически переходит на chunked, если Flusher.Flush()
  #     зовётся до установки Content-Length — никаких header-трюков не нужно.
  location /api/v1/events/stream {
    include /etc/nginx/snippets/security-headers.conf;
    proxy_pass http://orchestrator:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection '';
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 24h;
    proxy_send_timeout 24h;
    # §13.2 явно требует chunked_transfer_encoding on. Современный nginx 1.1+
    # включает chunked автоматически, когда Content-Length отсутствует, но
    # директива оставлена spec-1:1 — фиксирует контракт от регрессии при
    # будущих изменениях архитектуры.
    chunked_transfer_encoding on;
    gzip off;
    # Defense-in-depth: подсказка любому intermediate-proxy (CDN, service-mesh)
    # не буферизировать — nginx выставляет заголовок в сторону клиента.
    add_header X-Accel-Buffering "no" always;
    # Не светим версию и идентификацию upstream.
    proxy_hide_header Server;
    proxy_hide_header X-Powered-By;
  }

  # --------------------------------------------------------------------- API
  # Transparent reverse-proxy. 25m запас над лимитом файла 20 МБ (§7.3).
  # gzip оставлен включённым (наследуется server-уровнем) для крупных JSON-
  # ответов (DiffViewer, отчёты). BREACH/CRIME здесь не реализуем: Orchestrator
  # аутентифицируется Bearer-токеном в Authorization header (см. §5.4 + §7.4),
  # а не sensitive cookies, поэтому утекать сжатой стороной нечего.
  location /api/ {
    include /etc/nginx/snippets/security-headers.conf;
    proxy_pass http://orchestrator:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 25m;
    # Не светим версию upstream (Orchestrator может выставить Server: Gin).
    proxy_hide_header Server;
    proxy_hide_header X-Powered-By;
  }

  # ------------------------------------------------------------ SPA fallback
  # Клиентские роуты (/contracts/:id, /result/:id, ...) отдают index.html
  # с 200 — React Router резолвит путь сам.
  location / {
    include /etc/nginx/snippets/security-headers.conf;
    try_files $uri $uri/ /index.html;
  }
}
