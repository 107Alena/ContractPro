# =============================================================================
# Prometheus scrape config — ContractPro dev stack
# =============================================================================
# Скрейпит /metrics всех Go-сервисов внутри compose-сети. Имена таргетов —
# service-names из docker-compose.yaml.
# =============================================================================

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    env: dev
    cluster: contractpro-local

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: orchestrator
    metrics_path: /metrics
    static_configs:
      - targets: ["orchestrator:9090"]
        labels:
          service: api-backend-orchestrator

  - job_name: dm-service
    metrics_path: /metrics
    static_configs:
      - targets: ["dm-service:9090"]
        labels:
          service: document-management

  - job_name: dp-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["dp-worker:9090"]
        labels:
          service: document-processing

  - job_name: rabbitmq
    metrics_path: /metrics
    static_configs:
      - targets: ["rabbitmq:15692"]
        labels:
          service: rabbitmq
