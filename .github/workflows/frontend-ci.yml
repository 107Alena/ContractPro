# Frontend CI — каноничная реализация §13.3 high-architecture (FE-TASK-010).
#
# Три job'а (§13.3):
#   quality  — typecheck + lint + test:ci + build + size-limit + chromatic (PR).
#   e2e      — playwright install + e2e (webServer self-hosted через vite --mode e2e).
#   docker   — при push на master: buildx + push в registry с tag = github.sha.
#
# Все шаги выполняются в `Frontend/` (monorepo: сосед с DocumentProcessing/,
# DocumentManagement/, ApiBackendOrchestrator/). Workflow триггерится только
# при изменениях во Frontend/ (+ самого workflow) — см. `paths:` ниже.
name: Frontend CI

# Least-privilege: никакой job не нуждается в write-доступе. Защита от
# supply-chain атаки на third-party actions (chromaui/*, docker/*).
permissions:
  contents: read

on:
  push:
    branches: [master]
    paths:
      - 'Frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'Frontend/**'
      - '.github/workflows/frontend-ci.yml'

# Отменяем устаревшие прогоны на rapid pushes в одну ветку — экономит минуты.
concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: Frontend

jobs:
  quality:
    name: Quality (typecheck / lint / test / build / size-limit)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: Frontend/.nvmrc
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      # --ignore-scripts: `prepare` → `npm run gen:api` резолвит файл вне
      # build-context (../ApiBackendOrchestrator/architecture/api-specification.yaml),
      # который в CI лежит на disk и доступен. Явный `gen:api:check` шаг
      # гарантирует отсутствие drift'а (§15.2 CI-gate).
      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: OpenAPI drift check (gen:api vs committed)
        run: npm run gen:api:check

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit/integration tests (+ coverage)
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Bundle size budgets
        run: npx size-limit

      # Chromatic: только PR, только при наличии секрета. Без секрета step —
      # no-op (корректнее, чем fail на форках, где secrets недоступны).
      - name: Chromatic (visual regression)
        if: github.event_name == 'pull_request' && env.CHROMATIC_TOKEN != ''
        uses: chromaui/action@v11
        env:
          CHROMATIC_TOKEN: ${{ secrets.CHROMATIC_TOKEN }}
        with:
          projectToken: ${{ secrets.CHROMATIC_TOKEN }}
          workingDir: Frontend
          exitZeroOnChanges: true

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: Frontend/.nvmrc
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # Кешируем браузеры отдельно. --with-deps ставит системные либы в /usr/**,
      # они кешируются GitHub Actions между прогонами автоматически; хром —
      # в ~/.cache/ms-playwright, нужна явная запись/чтение.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('Frontend/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright system deps (cache-hit path)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Run E2E
        run: npm run e2e:ci

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: Frontend/playwright-report
          retention-days: 7

  docker:
    name: Docker build & push
    runs-on: ubuntu-latest
    needs: [quality, e2e]
    # Только master push (не PR, не форки). Если секреты не настроены —
    # job проходит no-op (push-step пропускается), чтобы не блокировать merge
    # до настройки registry.
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Registry login
        if: env.REGISTRY_USERNAME != '' && env.REGISTRY_PASSWORD != '' && env.REGISTRY_HOST != ''
        uses: docker/login-action@v3
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
        with:
          registry: ${{ vars.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # Если секреты/vars не настроены — build выполняется как smoke-тест
      # без push'а. Это разблокирует merge до настройки registry в Ops.
      - name: Build and push
        uses: docker/build-push-action@v5
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          push: ${{ env.REGISTRY_USERNAME != '' && env.REGISTRY_PASSWORD != '' && env.REGISTRY_HOST != '' }}
          tags: ${{ vars.REGISTRY_HOST || 'localhost' }}/contractpro-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
