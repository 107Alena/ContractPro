# =============================================================================
# ContractPro — Production Environment
# =============================================================================
# Usage:
#   docker compose -f docker-compose.prod.yaml up -d
#   docker compose -f docker-compose.prod.yaml logs -f dp-worker
#   docker compose -f docker-compose.prod.yaml down
#
# Required environment variables (set in shell or .env.prod):
#   RABBITMQ_USER, RABBITMQ_PASS  — broker credentials
#   REDIS_PASSWORD                — Redis password
#
# Yandex Cloud credentials go into .env.prod:
#   DP_STORAGE_ENDPOINT, DP_STORAGE_BUCKET, DP_STORAGE_ACCESS_KEY, DP_STORAGE_SECRET_KEY
#   DP_OCR_ENDPOINT, DP_OCR_API_KEY, DP_OCR_FOLDER_ID
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  rabbitmq:
    image: rabbitmq:3-alpine
    container_name: cp-rabbitmq
    ports:
      - "5672:5672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?set RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:?set RABBITMQ_PASS}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  redis:
    image: redis:7-alpine
    container_name: cp-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?set REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "6379:6379"
    environment:
      # REDISCLI_AUTH lets redis-cli authenticate automatically in healthcheck.
      REDISCLI_AUTH: ${REDIS_PASSWORD:?set REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ---------------------------------------------------------------------------
  # Application
  # ---------------------------------------------------------------------------

  dp-worker:
    image: contractpro/dp-worker:${DP_IMAGE_TAG:-latest}
    container_name: cp-dp-worker
    env_file:
      - .env.prod
    environment:
      DP_BROKER_ADDRESS: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672/
      DP_KVSTORE_ADDRESS: redis:6379
      DP_KVSTORE_PASSWORD: ${REDIS_PASSWORD}
      DP_LOG_LEVEL: info
    ports:
      - "8080:8080"
      - "9090:9090"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

volumes:
  rabbitmq-data:
  redis-data:
